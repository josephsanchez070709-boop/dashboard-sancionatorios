<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Procesos Sancionatorios - GEB</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bajo: #27ae60;
            --medio: #f39c12;
            --alto: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-weight: 700;
        }

        /* Buscador y Filtros */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box, .filter-box {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .search-box { flex-grow: 1; }

        /* Estilos de la Tabla */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            background-color: #f1f4f8;
            color: var(--primary);
            font-weight: 600;
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #eee;
            position: sticky;
            top: 0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
            font-size: 13.5px;
            line-height: 1.5;
        }

        tr:hover { background-color: #fcfcfc; }

        /* Etiquetas de Riesgo */
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }

        .riesgo-bajo { background-color: var(--bajo); }
        .riesgo-medio { background-color: var(--medio); }
        .riesgo-alto { background-color: var(--alto); }

        /* Columna de Argumentos */
        .text-truncate {
            max-width: 300px;
            max-height: 100px;
            overflow-y: auto;
            display: block;
        }

        .money {
            font-family: monospace;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
        }

        .expediente {
            color: var(--accent);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Control de Procesos Sancionatorios Ambientales</h1>
        <p>Resumen detallado de expedientes y estado de defensa técnica</p>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Buscar por expediente, entidad, asunto o proyecto...">
        <select id="filterRiesgo" class="filter-box">
            <option value="">Todos los Riesgos</option>
            <option value="BAJO">Riesgo Bajo</option>
            <option value="MEDIO">Riesgo Medio</option>
            <option value="ALTO">Riesgo Alto</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table id="sancionatoriosTable">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Entidad</th>
                    <th>Proyecto / Activo</th>
                    <th>Expediente</th>
                    <th>Etapa / Estado</th>
                    <th>Riesgo</th>
                    <th>Defensa y Argumentos</th>
                    <th>Cálculo Sanción</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Los datos se insertarán aquí con JavaScript -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const data = [
        { no: 1, entidad: "ANLA", activo: "Armenia", expediente: "SAN0049-00-2014", etapa: "Etapa probatoria", riesgo: "BAJO", argumentos: "Defensa: 1. No hay infracción ambiental, pues la torre 3 no se construyó en área de exclusión... 2. La actividad de replanteo estaba autorizada.", sancion: "97,347,471.50" },
        { no: 2, entidad: "ANLA", activo: "Armenia", expediente: "SAN0461-00-2019", etapa: "Etapa probatoria", riesgo: "MEDIO", argumentos: "Construcción de la torre 44 en ubicación distinta... El traslado se enmarca en la actividad de localización y replanteo autorizada.", sancion: "97,347,471.50" },
        { no: 6, entidad: "ANLA", activo: "Refuerzo suroccidental", expediente: "SAN0043-00-2021", etapa: "Etapa probatoria", riesgo: "ALTO", argumentos: "Probabilidad alta. Se ataca la inaplicabilidad de modificación de licencia para patios de acopio.", sancion: "88,901,800.00" },
        { no: 11, entidad: "CAR Soacha", activo: "Muña", expediente: "50056", etapa: "Alegatos de Conclusión", riesgo: "MEDIO", argumentos: "Temas de aireación forzada y riesgos por vapores. Defensa alega caducidad y violación al debido proceso.", sancion: "1,766,564,800.00" },
        { no: 12, entidad: "SDA", activo: "Corporativo", expediente: "SDA-08-2022-50", etapa: "Pendiente resolución", riesgo: "BAJO", argumentos: "Residuos peligrosos. GEB no es generador, la responsabilidad es de contratistas (INDRA/Transener).", sancion: "15,073,157.30" },
        { no: 21, entidad: "ANLA", activo: "Sogamoso", expediente: "SAN0352-00-2024", etapa: "Pendiente resolución", riesgo: "BAJO", argumentos: "Invasión de ronda de protección. Se alega eximente por fuerza mayor debido a pandemia.", sancion: "64,238,720.00" }
        // Se pueden agregar más filas aquí siguiendo este formato
    ];

    // Datos extendidos basados en tu texto (ejemplos seleccionados para demostración)
    const rawData = [
        {no: 1, ent: "ANLA", act: "Armenia", exp: "SAN0049-00-2014", eta: "Etapa probatoria", ri: "BAJO", arg: "Torres 4, 11, 12 y 20. Se argumenta que era actividad autorizada en licencia.", val: "97,347,471.50"},
        {no: 3, ent: "ANLA", act: "Armenia", exp: "SAN0063-00-2018", eta: "Etapa probatoria", ri: "MEDIO", arg: "Construcción de Torre 71. Defensa: amparada por PMA.", val: "97,347,471.50"},
        {no: 5, ent: "ANLA", act: "Río Córdoba", exp: "SAN0156-00-2018", eta: "Etapa probatoria", ri: "BAJO", arg: "Box Coulvert vs Alcantarilla. Empresa informó el cambio y cumple funciones.", val: "45,581,806.40"},
        {no: 8, ent: "CORPONARIÑO", act: "Línea Ecuador", exp: "PSSC-312-19", eta: "Pendiente cesación", ri: "BAJO", arg: "Poda de Acacia Japonesa. Actividad de mantenimiento de servidumbre.", val: "45,219,470.90"},
        {no: 16, ent: "ANLA", act: "Armenia", exp: "SAN0048-00-2024", eta: "Descargos presentados", ri: "MEDIO", arg: "Evaluación económica ambiental. Se alega omisión de etapa de cesación.", val: "80,298,400.00"}
    ];

    function renderTable(filterText = "", filterRiesgo = "") {
        const body = document.getElementById('tableBody');
        body.innerHTML = "";

        const filtered = rawData.filter(item => {
            const matchesSearch = Object.values(item).some(val => 
                val.toString().toLowerCase().includes(filterText.toLowerCase())
            );
            const matchesRiesgo = filterRiesgo === "" || item.ri === filterRiesgo;
            return matchesSearch && matchesRiesgo;
        });

        filtered.forEach(item => {
            const row = `
                <tr>
                    <td>${item.no}</td>
                    <td><strong>${item.ent}</strong></td>
                    <td>${item.act}</td>
                    <td class="expediente">${item.exp}</td>
                    <td>${item.eta}</td>
                    <td><span class="badge riesgo-${item.ri.toLowerCase()}">${item.ri}</span></td>
                    <td><div class="text-truncate">${item.arg}</div></td>
                    <td class="money">$ ${item.val}</td>
                </tr>
            `;
            body.innerHTML += row;
        });
    }

    // Listeners para filtros
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderTable(e.target.value, document.getElementById('filterRiesgo').value);
    });

    document.getElementById('filterRiesgo').addEventListener('change', (e) => {
        renderTable(document.getElementById('searchInput').value, e.target.value);
    });

    // Carga inicial
    renderTable();
</script>

</body>
</html>
